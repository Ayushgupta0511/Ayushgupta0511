<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 222 488" fill="none">
  <defs>
    <linearGradient id="scanGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00D4FF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-2px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes scanDown {
      0% { transform: translateY(34px); opacity: 0; }
      5% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(468px); opacity: 0; }
    }

    .line {
      font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", "SF Mono", "Courier New", monospace;
      font-size: 11px;
      opacity: 0;
      animation: fadeIn 0.25s ease-out forwards;
    }

    .cyan   { fill: #00D4FF; }
    .green  { fill: #3FB950; }
    .dim    { fill: #6E7681; }
    .purple { fill: #BC8CFF; }
    .gold   { fill: #FFCA28; }

    .l0 { animation-delay: 0.00s; }
    .l1 { animation-delay: 0.08s; }
    .l2 { animation-delay: 0.16s; }
    .l3 { animation-delay: 0.24s; }
    .l4 { animation-delay: 0.32s; }
    .l5 { animation-delay: 0.40s; }
    .l6 { animation-delay: 0.48s; }
    .l7 { animation-delay: 0.56s; }
    .l8 { animation-delay: 0.64s; }
    .l9 { animation-delay: 0.72s; }
    .l10 { animation-delay: 0.80s; }
    .l11 { animation-delay: 0.88s; }
    .l12 { animation-delay: 0.96s; }
    .l13 { animation-delay: 1.04s; }
    .l14 { animation-delay: 1.12s; }
    .l15 { animation-delay: 1.20s; }
    .l16 { animation-delay: 1.28s; }
    .l17 { animation-delay: 1.36s; }
    .l18 { animation-delay: 1.44s; }
    .l19 { animation-delay: 1.52s; }
    .l20 { animation-delay: 1.60s; }
    .l21 { animation-delay: 1.68s; }
    .l22 { animation-delay: 1.76s; }
    .l23 { animation-delay: 1.84s; }
    .l24 { animation-delay: 1.92s; }
    .l25 { animation-delay: 2.00s; }
    .l26 { animation-delay: 2.08s; }
    .l27 { animation-delay: 2.16s; }
    .l28 { animation-delay: 2.24s; }
    .l29 { animation-delay: 2.32s; }
    .l30 { animation-delay: 2.40s; }
    .l31 { animation-delay: 2.48s; }

    .cursor {
      fill: #3FB950;
      animation: blink 1s step-end infinite;
      animation-delay: 3.0s;
      opacity: 0;
    }

    .scan-line {
      animation: scanDown 2.7s ease-in-out forwards;
      animation-delay: 0.1s;
    }

    .header-text {
      font-family: "JetBrains Mono", "Fira Code", "Courier New", monospace;
      font-size: 9px;
      fill: #8B949E;
    }
  </style>

  <!-- Terminal Window -->
  <rect x="1" y="1" width="220" height="486" rx="10" fill="none" stroke="#7C3AED" stroke-width="0.5" opacity="0.3"/>
  <rect width="222" height="488" rx="10" fill="#0D1117"/>
  <rect width="222" height="488" rx="10" fill="none" stroke="#30363D" stroke-width="1"/>

  <!-- Header -->
  <rect x="1" y="1" width="220" height="32" rx="10" fill="#161B22"/>
  <rect x="1" y="20" width="220" height="14" fill="#161B22"/>
  <line x1="0" y1="34" x2="222" y2="34" stroke="#30363D" stroke-width="0.5"/>
  <circle cx="16" cy="17" r="4.5" fill="#FF5F56"/>
  <circle cx="30" cy="17" r="4.5" fill="#FFBD2E"/>
  <circle cx="44" cy="17" r="4.5" fill="#27C93F"/>
  <text x="111" y="20" text-anchor="middle" class="header-text">portrait.sh — terminal</text>

