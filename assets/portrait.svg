<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 290 691" fill="none">
  <defs>
    <linearGradient id="scanGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00D4FF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-2px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes scanDown {
      0% { transform: translateY(36px); opacity: 0; }
      5% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(661px); opacity: 0; }
    }

    .line {
      font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", "SF Mono", "Courier New", monospace;
      font-size: 10px;
      opacity: 0;
      animation: fadeIn 0.25s ease-out forwards;
    }

    .cyan   { fill: #00D4FF; }
    .green  { fill: #3FB950; }
    .dim    { fill: #6E7681; }
    .white  { fill: #E6EDF3; }
    .purple { fill: #BC8CFF; }
    .gold   { fill: #FFCA28; }

    .l0 { animation-delay: 0.00s; }
    .l1 { animation-delay: 0.06s; }
    .l2 { animation-delay: 0.12s; }
    .l3 { animation-delay: 0.18s; }
    .l4 { animation-delay: 0.24s; }
    .l5 { animation-delay: 0.30s; }
    .l6 { animation-delay: 0.36s; }
    .l7 { animation-delay: 0.42s; }
    .l8 { animation-delay: 0.48s; }
    .l9 { animation-delay: 0.54s; }
    .l10 { animation-delay: 0.60s; }
    .l11 { animation-delay: 0.66s; }
    .l12 { animation-delay: 0.72s; }
    .l13 { animation-delay: 0.78s; }
    .l14 { animation-delay: 0.84s; }
    .l15 { animation-delay: 0.90s; }
    .l16 { animation-delay: 0.96s; }
    .l17 { animation-delay: 1.02s; }
    .l18 { animation-delay: 1.08s; }
    .l19 { animation-delay: 1.14s; }
    .l20 { animation-delay: 1.20s; }
    .l21 { animation-delay: 1.26s; }
    .l22 { animation-delay: 1.32s; }
    .l23 { animation-delay: 1.38s; }
    .l24 { animation-delay: 1.44s; }
    .l25 { animation-delay: 1.50s; }
    .l26 { animation-delay: 1.56s; }
    .l27 { animation-delay: 1.62s; }
    .l28 { animation-delay: 1.68s; }
    .l29 { animation-delay: 1.74s; }
    .l30 { animation-delay: 1.80s; }
    .l31 { animation-delay: 1.86s; }
    .l32 { animation-delay: 1.92s; }
    .l33 { animation-delay: 1.98s; }
    .l34 { animation-delay: 2.04s; }
    .l35 { animation-delay: 2.10s; }
    .l36 { animation-delay: 2.16s; }
    .l37 { animation-delay: 2.22s; }
    .l38 { animation-delay: 2.28s; }
    .l39 { animation-delay: 2.34s; }
    .l40 { animation-delay: 2.40s; }
    .l41 { animation-delay: 2.46s; }
    .l42 { animation-delay: 2.52s; }
    .l43 { animation-delay: 2.58s; }
    .l44 { animation-delay: 2.64s; }
    .l45 { animation-delay: 2.70s; }
    .l46 { animation-delay: 2.76s; }
    .l47 { animation-delay: 2.82s; }
    .l48 { animation-delay: 2.88s; }

    .cursor {
      fill: #3FB950;
      animation: blink 1s step-end infinite;
      animation-delay: 3.3s;
      opacity: 0;
    }

    .scan-line {
      animation: scanDown 2.8s ease-in-out forwards;
      animation-delay: 0.1s;
    }

    .header-text {
      font-family: "JetBrains Mono", "Fira Code", "Courier New", monospace;
      font-size: 9px;
      fill: #8B949E;
    }
  </style>

  <!-- Terminal Window -->
  <rect x="1" y="1" width="288" height="689" rx="10" fill="none" stroke="#7C3AED" stroke-width="0.5" opacity="0.3"/>
  <rect x="0" y="0" width="290" height="691" rx="10" fill="#0D1117"/>
  <rect x="0" y="0" width="290" height="691" rx="10" fill="none" stroke="#30363D" stroke-width="1"/>

