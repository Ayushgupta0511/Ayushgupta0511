<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 470" fill="none">
  <defs>
    <!-- Terminal glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Scan line gradient -->
    <linearGradient id="scanGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00D4FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-3px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes scanDown {
      0% { transform: translateY(40px); opacity: 0; }
      5% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(430px); opacity: 0; }
    }

    .line {
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
      font-size: 12.5px;
      opacity: 0;
      animation: fadeIn 0.35s ease-out forwards;
    }

    .cyan   { fill: #00D4FF; }
    .green  { fill: #3FB950; }
    .dim    { fill: #6E7681; }
    .white  { fill: #E6EDF3; }
    .purple { fill: #BC8CFF; }
    .gold   { fill: #FFCA28; }

    .l0  { animation-delay: 0.1s; }
    .l1  { animation-delay: 0.25s; }
    .l2  { animation-delay: 0.55s; }
    .l3  { animation-delay: 0.70s; }
    .l4  { animation-delay: 0.85s; }
    .l5  { animation-delay: 1.00s; }
    .l6  { animation-delay: 1.15s; }
    .l7  { animation-delay: 1.30s; }
    .l8  { animation-delay: 1.45s; }
    .l9  { animation-delay: 1.60s; }
    .l10 { animation-delay: 1.75s; }
    .l11 { animation-delay: 1.90s; }
    .l12 { animation-delay: 2.05s; }
    .l13 { animation-delay: 2.20s; }
    .l14 { animation-delay: 2.35s; }
    .l15 { animation-delay: 2.50s; }
    .l16 { animation-delay: 2.65s; }
    .l17 { animation-delay: 2.80s; }
    .l18 { animation-delay: 2.95s; }
    .l19 { animation-delay: 3.10s; }
    .l20 { animation-delay: 3.30s; }
    .l21 { animation-delay: 3.50s; }
    .l22 { animation-delay: 3.70s; }
    .l23 { animation-delay: 3.90s; }
    .l24 { animation-delay: 4.20s; }

    .cursor {
      fill: #3FB950;
      animation: blink 1s step-end infinite;
      animation-delay: 4.5s;
      opacity: 0;
    }

    .scan-line {
      animation: scanDown 4s ease-in-out forwards;
      animation-delay: 0.3s;
    }

    .header-text {
      font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
      font-size: 11px;
      fill: #8B949E;
    }
  </style>

  <!-- ══ Terminal Window ══ -->
  <!-- Outer glow border -->
  <rect x="1" y="1" width="418" height="468" rx="13" fill="none" stroke="#7C3AED" stroke-width="0.5" opacity="0.3"/>
  <!-- Main background -->
  <rect x="0" y="0" width="420" height="470" rx="12" fill="#0D1117"/>
  <!-- Border -->
  <rect x="0" y="0" width="420" height="470" rx="12" fill="none" stroke="#30363D" stroke-width="1"/>

  <!-- ══ Header Bar ══ -->
  <rect x="1" y="1" width="418" height="34" rx="12" fill="#161B22"/>
  <rect x="1" y="22" width="418" height="13" fill="#161B22"/>
  <!-- Separator line -->
  <line x1="0" y1="35" x2="420" y2="35" stroke="#30363D" stroke-width="0.5"/>
  <!-- Traffic light dots -->
  <circle cx="20" cy="18" r="5.5" fill="#FF5F56"/>
  <circle cx="38" cy="18" r="5.5" fill="#FFBD2E"/>
  <circle cx="56" cy="18" r="5.5" fill="#27C93F"/>
  <!-- Title -->
  <text x="210" y="22" text-anchor="middle" class="header-text">portrait.sh — terminal</text>

  <!-- ══ Scan Line Effect ══ -->
  <rect class="scan-line" x="5" y="40" width="410" height="12" rx="1" fill="url(#scanGrad)" opacity="0"/>

  <!-- ══ Content Lines ══ -->
  <!-- Command -->
  <text class="line green l0" x="20" y="60" xml:space="preserve">$ ./render_portrait.sh</text>
  <!-- Loading bar -->
  <text class="line dim l1" x="20" y="78" xml:space="preserve">[#####################] 100%</text>

  <!-- ══ ASCII Portrait ══ -->
  <text class="line cyan l2"  x="20" y="102" xml:space="preserve">        .=*#%%@@@@%%#*=.        </text>
  <text class="line cyan l3"  x="20" y="118" xml:space="preserve">      =#@@@@@@@@@@@@@@@@#=      </text>
  <text class="line cyan l4"  x="20" y="134" xml:space="preserve">    =@@@@@@@@@@@@@@@@@@@@@@=    </text>
  <text class="line cyan l5"  x="20" y="150" xml:space="preserve">   #@@@@@@@@@@@@@@@@@@@@@@@@#   </text>
  <text class="line cyan l6"  x="20" y="166" xml:space="preserve">  %@@@@@*=::::::::::=*@@@@@%   </text>
  <text class="line cyan l7"  x="20" y="182" xml:space="preserve"> #@@@@=                =@@@@#  </text>
  <text class="line cyan l8"  x="20" y="198" xml:space="preserve"> @@@@   [====]  [====]  @@@@   </text>
  <text class="line cyan l9"  x="20" y="214" xml:space="preserve"> @@@@   | ** |  | ** |  @@@@   </text>
  <text class="line cyan l10" x="20" y="230" xml:space="preserve"> @@@@   [====]  [====]  @@@@   </text>
  <text class="line cyan l11" x="20" y="246" xml:space="preserve"> #@@@@=       @@      =@@@@#  </text>
  <text class="line cyan l12" x="20" y="262" xml:space="preserve">  %@@@@@*  @@@@@@  *@@@@@%    </text>
  <text class="line cyan l13" x="20" y="278" xml:space="preserve">   #@@@@@  {-----}  @@@@@#    </text>
  <text class="line cyan l14" x="20" y="294" xml:space="preserve">    =@@@@@  '---'  @@@@@=     </text>
  <text class="line cyan l15" x="20" y="310" xml:space="preserve">      =#@@@@@@@@@@@@@@#=      </text>
  <text class="line cyan l16" x="20" y="326" xml:space="preserve">        .=*#%%@@%%#*=.        </text>
  <text class="line cyan l17" x="20" y="342" xml:space="preserve">       @@   @@@@@@   @@       </text>
  <text class="line cyan l18" x="20" y="358" xml:space="preserve">      @@     @@@@     @@      </text>

  <!-- ══ Info Lines ══ -->
  <text class="line green l20"  x="20" y="386" xml:space="preserve">&gt; name = "Ayush Gupta"</text>
  <text class="line purple l21" x="20" y="404" xml:space="preserve">&gt; role = "B.Tech CS | AI Dev"</text>
  <text class="line dim l22"    x="20" y="422" xml:space="preserve">&gt; city = "Greater Noida, IN"</text>

  <!-- ══ Completion ══ -->
  <text class="line gold l24" x="20" y="450" xml:space="preserve">render_complete ✓</text>

  <!-- Blinking cursor -->
  <rect class="cursor" x="180" y="440" width="8" height="14" rx="1"/>
</svg>
